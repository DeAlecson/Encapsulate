<!DOCTYPE html>
<html lang="en" data-theme="dark" data-fontsize="medium">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Encapsulate — A mobile-friendly ICT162 OOP learning assistant">
  <meta name="theme-color" content="#7c6aef">
  <title>Encapsulate — ICT162 OOP Coach</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/themes.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/editor.css">
</head>
<body>

<div class="app-layout">
  <!-- ======== HEADER ======== -->
  <header class="app-header">
    <div class="header__left">
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
      <div class="header__logo">Encapsulate<span> — ICT162</span></div>
    </div>
    <div class="header__stats">
      <span class="header__stat header__stat--level" id="header-level">Lv 1</span>
      <div class="xp-bar"><div class="xp-bar__fill" id="xp-bar-fill" style="width:0%"></div></div>
      <span class="header__stat" id="header-xp">0 XP</span>
      <span class="header__stat" id="header-streak"></span>
    </div>
    <div class="header__right">
      <button class="settings-btn" id="settings-toggle" aria-label="Settings">
        <span class="settings-btn__icon">⚙</span>
        <span class="settings-btn__label">Settings</span>
      </button>
    </div>
  </header>

  <!-- ======== SIDEBAR NAV ======== -->
  <nav class="side-nav" id="side-nav">
    <div class="nav__group">
      <div class="nav__heading">Main</div>
      <button class="nav__link" data-route="/">
        <span class="nav__icon">🏠</span> Dashboard
      </button>
      <button class="nav__link" data-route="/units">
        <span class="nav__icon">📚</span> Study Units
      </button>
      <button class="nav__link" data-route="/skillmap">
        <span class="nav__icon">🗺️</span> Skill Map
      </button>
    </div>
    <div class="nav__group">
      <div class="nav__heading">Practice</div>
      <button class="nav__link" data-route="/quiz">
        <span class="nav__icon">❓</span> Theory Quiz
      </button>
      <button class="nav__link" data-route="/practice">
        <span class="nav__icon">💻</span> Code Practice
      </button>
      <button class="nav__link" data-route="/mock">
        <span class="nav__icon">🏆</span> Mock Exam
      </button>
    </div>
    <div class="nav__group">
      <div class="nav__heading">Review</div>
      <button class="nav__link" data-route="/review">
        <span class="nav__icon">📖</span> Review Vault
      </button>
      <button class="nav__link" data-route="/ai">
        <span class="nav__icon">🤖</span> AI Studio
      </button>
    </div>
  </nav>

  <!-- ======== MAIN CONTENT ======== -->
  <main class="main-content" id="main-content">
    <!-- Rendered by router -->
  </main>
</div>

<!-- ======== SETTINGS PANEL (overlay) ======== -->
<div class="settings-panel" id="settings-panel">
  <div class="settings__header">
    <h2 class="settings__title">Settings</h2>
    <button class="settings__close" id="settings-close" aria-label="Close settings">✕</button>
  </div>
  <div id="settings-content"></div>
</div>
<div class="settings-backdrop" id="settings-backdrop"></div>

<!-- ======== TOAST ======== -->
<div class="toast" id="toast-container"></div>

<!-- ======== SCRIPTS (order matters) ======== -->
<script src="./js/storage.js"></script>
<script src="./js/state.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/router.js"></script>
<script src="./js/gamification.js"></script>
<script src="./js/ai-prompts.js"></script>
<script src="./js/ai.js"></script>
<script src="./js/fallback-marker.js"></script>
<script src="./js/marking-service.js"></script>
<script src="./js/settings.js"></script>
<script src="./js/lesson-engine.js"></script>
<script src="./js/quiz-engine.js"></script>
<script src="./js/practice-engine.js"></script>
<script src="./js/mock-engine.js"></script>
<script src="./js/renderer.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
